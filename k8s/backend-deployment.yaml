apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:
        - name: backend

          image: hospital_recommendation_system-backend:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000