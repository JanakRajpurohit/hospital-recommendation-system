name: Hospital Recommendation CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      # STEP 1
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # STEP 3
      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 4
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend ./backend

      # STEP 5
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-frontend ./frontend

      # STEP 6
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend

      # STEP 7
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-frontend

      # STEP 8
      - name: Kubernetes Deploy
        run: |
          echo "Deploying to Kubernetes..."