name: Hospital Recommendation CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # DockerHub Login
      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Backend Image
      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend ./backend

      # Build Frontend Image
      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-frontend ./frontend

      # Push Backend
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend

      # Push Frontend
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-frontend